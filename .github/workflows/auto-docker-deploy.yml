name: Publish Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  push_to_registries:
    name: Push Docker image to multiple registries
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Get latest release tag
        id: get_latest_release
        uses: actions/github-script@v6
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const latestRelease = releases.find(release => !release.prerelease && !release.draft);
            if (latestRelease) {
              core.setOutput('tag', latestRelease.tag_name);
            } else {
              core.setOutput('tag', 'latest'); // Fallback if no releases found
            }
          result-encoding: string

      - name: Log in to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME && format('{0}/sparkyfitness', secrets.DOCKER_USERNAME) || '' }}
            ghcr.io/${{ steps.repo.outputs.name }}-frontend
          tags: |
            type=raw,value=${{ steps.get_latest_release.outputs.tag }}
            type=raw,value=latest

      - name: Build and push frontend
        id: push-frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation Frontend
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.repo.outputs.name }}-frontend
          subject-digest: ${{ steps.push-frontend.outputs.digest }}
          push-to-registry: true

      - name: Metadata server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME && format('{0}/sparkyfitness_server', secrets.DOCKER_USERNAME) || '' }}
            ghcr.io/${{ steps.repo.outputs.name }}-server
          tags: |
            type=raw,value=${{ steps.get_latest_release.outputs.tag }}
            type=raw,value=latest

      - name: Build and push server
        id: push-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation server
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.repo.outputs.name }}-server
          subject-digest: ${{ steps.push-server.outputs.digest }}
          push-to-registry: true

      - name: Metadata Garmin Microservice
        id: meta-garmin
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME && format('{0}/sparkyfitness_garmin', secrets.DOCKER_USERNAME) || '' }}
            ghcr.io/${{ steps.repo.outputs.name }}-garmin
          tags: |
            type=raw,value=${{ steps.get_latest_release.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Garmin Microservice
        id: push-garmin
        uses: docker/build-push-action@v6
        with:
          context: SparkyFitnessGarmin
          file: docker/Dockerfile.garmin_microservice
          push: true
          tags: ${{ steps.meta-garmin.outputs.tags }}
          labels: ${{ steps.meta-garmin.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation Garmin Microservice
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.repo.outputs.name }}-garmin
          subject-digest: ${{ steps.push-garmin.outputs.digest }}
          push-to-registry: true


      # ── Unified ──────────────────────────────────────────────────────────────
      - name: Metadata unified
        id: meta-unified
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME && format('{0}/sparkyfitness-unified', secrets.DOCKER_USERNAME) || '' }}
            ghcr.io/${{ steps.repo.outputs.name }}-unified
          tags: |
            type=raw,value=${{ steps.get_latest_release.outputs.tag }}
            type=raw,value=latest

      - name: Build and push unified
        id: push-unified
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.unified
          push: true
          tags: ${{ steps.meta-unified.outputs.tags }}
          labels: ${{ steps.meta-unified.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation unified
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.repo.outputs.name }}-unified
          subject-digest: ${{ steps.push-unified.outputs.digest }}
          push-to-registry: true


