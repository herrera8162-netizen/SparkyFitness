name: Auto Publish Unified Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_push:
    name: Build and Push Unified Image to GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata unified
        id: meta-unified
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.name }}-unified
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push unified
        id: push-unified
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.unified
          push: true
          tags: ${{ steps.meta-unified.outputs.tags }}
          labels: ${{ steps.meta-unified.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation unified
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.repo.outputs.name }}-unified
          subject-digest: ${{ steps.push-unified.outputs.digest }}
          push-to-registry: true
