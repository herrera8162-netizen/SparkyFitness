<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Baby at week 36: full-term baby lying head-down, filling the womb">
  <circle cx="120" cy="120" r="112" fill="#FDF2EC"/>
  <path d="M16 200 Q120 126 224 200" fill="none" stroke="#E8B4A0" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <!-- womb at full size -->
  <path d="M120 42 C172 42 198 84 194 130 C190 176 158 202 120 206 C82 202 50 176 46 130 C42 84 68 42 120 42 Z"
        fill="#F9E0D8" stroke="#EFC0B0" stroke-width="4"/>
  <ellipse cx="120" cy="126" rx="62" ry="70" fill="#FBEAE4"/>
  <!-- baby head-down: back curled along the right wall, head at the bottom -->
  <path d="M96 150 C88 118 104 84 136 82 C160 82 170 104 162 126 C156 142 146 152 134 158 C126 150 108 144 96 150 Z"
        fill="#E08A70"/>
  <circle cx="112" cy="164" r="26" fill="#E08A70"/>
  <!-- folded legs -->
  <path d="M150 120 q4 -18 -12 -24" stroke="#D97F6C" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M142 132 q8 -12 -2 -22" stroke="#E08A70" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- arm near face -->
  <path d="M104 150 q-7 6 -3 13" stroke="#D97F6C" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- closed eye, resting -->
  <path d="M101 164 q3.5 3 7 0" stroke="#FDF2EC" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- umbilical cord -->
  <path d="M150 100 q13 1 13 13" stroke="#D97F6C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="80" cy="110" r="2.4" fill="#F3C8BC"/>
  <circle cx="160" cy="160" r="2" fill="#F3C8BC"/>
</svg>
