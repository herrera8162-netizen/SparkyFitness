<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Passkey Login</title>
    <script src="/api/auth/web-login/simplewebauthn-browser.umd.min.js"></script>
    <style>
      body {
        background-color: #0b0f19;
        color: #f3f4f6;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .card {
        background-color: #1f2937;
        border: 1px solid #374151;
        padding: 30px;
        border-radius: 12px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 10px;
        color: #3b82f6;
      }
      p {
        color: #9ca3af;
        font-size: 0.875rem;
        margin-bottom: 25px;
      }
      .btn {
        background-color: #3b82f6;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        transition: background-color 0.2s;
      }
      .btn:hover {
        background-color: #2563eb;
      }
      .btn:disabled {
        background-color: #4b5563;
        cursor: not-allowed;
      }
      .error {
        color: #ef4444;
        margin-top: 15px;
        font-size: 0.875rem;
      }
      .spinner {
        border: 3px solid #374151;
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="loading-spinner" class="spinner"></div>
      <h1 id="title">Authenticating...</h1>
      <p id="desc">Please complete the biometric passkey prompt.</p>
      <button id="retry-btn" class="btn" style="display: none">
        Retry Passkey Login
      </button>
      <div id="error-msg" class="error"></div>
    </div>

    <script>
      const { startAuthentication } = SimpleWebAuthnBrowser;

      function friendlyAuthenticationError(err) {
        switch (err.code) {
          case 'ERROR_CEREMONY_ABORTED':
            return 'Passkey sign-in was cancelled or timed out. Make sure this device has a passkey registered for your account.';
          case 'ERROR_INVALID_DOMAIN':
          case 'ERROR_INVALID_RP_ID':
            return 'This server is not set up correctly for passkeys (its domain does not match the passkey configuration).';
        }
        if (err.name === 'NotAllowedError') {
          return 'Passkey sign-in was cancelled or timed out. Make sure this device has a passkey registered for your account.';
        }
        return err.message || String(err);
      }

      async function doAuth() {
        const errorDiv = document.getElementById('error-msg');
        const retryBtn = document.getElementById('retry-btn');
        const spinner = document.getElementById('loading-spinner');
        const title = document.getElementById('title');
        const desc = document.getElementById('desc');

        errorDiv.innerText = '';
        retryBtn.style.display = 'none';
        spinner.style.display = 'block';
        title.innerText = 'Authenticating...';
        desc.innerText = 'Please complete the biometric passkey prompt.';

        try {
          if (!window.isSecureContext) {
            throw new Error(
              'Passkeys require a secure (HTTPS) connection. Please update the server URL in the app to use HTTPS.'
            );
          }
          if (!window.PublicKeyCredential) {
            throw new Error(
              'This browser does not support passkeys. Please set a different default browser and try again.'
            );
          }

          // 1. Fetch authentication options from the server
          const optionsRes = await fetch(
            '/api/auth/passkey/generate-authenticate-options'
          );
          if (!optionsRes.ok) {
            throw new Error(
              'Failed to generate passkey authentication options.'
            );
          }
          const options = await optionsRes.json();

          // 2. Trigger the browser's native passkey prompt
          const assertion = await startAuthentication({ optionsJSON: options });

          // 3. Post verification assertion to the server
          const verifyRes = await fetch(
            '/api/auth/passkey/verify-authentication',
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ response: assertion }),
            }
          );

          if (!verifyRes.ok) {
            const errData = await verifyRes.json().catch(() => ({}));
            throw new Error(
              errData.message || 'Passkey verification failed on server.'
            );
          }

          // Success! Redirect to the cookie callback to return session to the app
          title.innerText = 'Success!';
          desc.innerText = 'Redirecting back to the app...';
          window.location.href = '/api/auth/web-login/callback';
        } catch (err) {
          console.error(err);
          spinner.style.display = 'none';
          title.innerText = 'Login Failed';
          desc.innerText = 'Could not authenticate with your passkey.';
          errorDiv.innerText = friendlyAuthenticationError(err);
          retryBtn.style.display = 'block';
        }
      }

      document.getElementById('retry-btn').onclick = doAuth;

      // Auto-trigger on load
      window.onload = doAuth;
    </script>
  </body>
</html>
