limit_req_zone $binary_remote_addr zone=login_signup_zone:10m rate=5r/s;

server {
  listen ${NGINX_LISTEN_PORT};
  server_name localhost;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https:;" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Root directory for the static files
  root /usr/share/nginx/html;
  index index.html index.htm;

  # Handle client-side routing for the React app
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
  gzip_disable "MSIE [1-6]\.";

  # Apply rate limit to all authentication endpoints (for requests with /api/ prefix)
  location ^~ /api/auth/ {
      limit_req zone=login_signup_zone burst=10 nodelay;
      proxy_pass http://${SPARKY_FITNESS_SERVER_HOST}:${SPARKY_FITNESS_SERVER_PORT};
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Ssl on;
  }

  location ~ ^/api/health(/|$) {
    deny all;
    access_log off;
  }

  location /health-data {
    proxy_pass http://${SPARKY_FITNESS_SERVER_HOST}:${SPARKY_FITNESS_SERVER_PORT}/api/health-data;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on; # Explicitly tell backend that connection is SSL
  }


  # Proxy requests for uploaded files to the backend.
  # Use simple prefix location matching
  location ^~ /uploads/ {
    proxy_pass http://${SPARKY_FITNESS_SERVER_HOST}:${SPARKY_FITNESS_SERVER_PORT}/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on; # Explicitly tell backend that connection is SSL
  }

  # Use a standard prefix match for /api/
  # This serves as the catch-all for API requests not handled by more specific blocks like /api/auth/
  location ^~ /api/ {
    proxy_pass http://${SPARKY_FITNESS_SERVER_HOST}:${SPARKY_FITNESS_SERVER_PORT};
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on; # Explicitly tell backend that connection is SSL

    proxy_buffer_size 16k;
    proxy_buffers 16 64k;
    proxy_busy_buffers_size 128k;
  }

  # External MCP endpoint (JSON-RPC over StreamableHTTP), proxied to the server.
  # Buffering off + keep-alive cleared so text/event-stream responses stream.
  location ^~ /mcp {
    proxy_pass http://${SPARKY_FITNESS_SERVER_HOST}:${SPARKY_FITNESS_SERVER_PORT};
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on; # Explicitly tell backend that connection is SSL

    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, no-transform, immutable";
    try_files $uri =404;
  }

  # CORS for static assets fetched at runtime (manifest.json, i18n locale
  # files). Same-origin deployments don't need this, but it lets a frontend
  # served from a different origin than SPARKY_FITNESS_FRONTEND_URL fetch
  # these without a browser CORS error. Credentialed requests can't use "*",
  # so we echo back the configured frontend origin.
  location = /manifest.json {
    add_header Access-Control-Allow-Origin "${SPARKY_FITNESS_FRONTEND_URL}" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location ^~ /locales/ {
    add_header Access-Control-Allow-Origin "${SPARKY_FITNESS_FRONTEND_URL}" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
    expires 1d;
    add_header Cache-Control "public";
  }

  # Optional: Add headers to prevent caching issues
  # Cache static assets for a long time
  location ~* \.(?:png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 7d;
    add_header Cache-Control "public, no-transform, immutable";
  }
  # Handle client-side routing for the React app
  location / {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }

  client_max_body_size 10m;               # Prevent large file DOS
  proxy_connect_timeout 60s;              # Increased connect timeout
  proxy_send_timeout 300s;                # Increased send timeout for long operations
  proxy_read_timeout 300s;                # Increased read timeout for long operations (e.g., backups)

  # Enabled logging
  access_log ${NGINX_ACCESS_LOG};
  error_log ${NGINX_ERROR_LOG} warn;
}
